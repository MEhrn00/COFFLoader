[constants]
arch = 'i686'
triplet = arch + '-w64-mingw32'

[binaries]
c = triplet + '-gcc'
ar = triplet + '-ar'
pkg-config = triplet + '-pkg-config'
ranlib = triplet + '-ranlib'
strip = triplet + '-strip'

[properties]
needs_exe_wrapper = true

[host_machine]
system = 'windows'
cpu_family = 'x86'
cpu = 'i686'
endian = 'little'
